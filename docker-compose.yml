services:
  family-tree:
    build:
      context: .
      dockerfile: Dockerfile
    image: family-tree-v2:latest
    container_name: family-tree-v2
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
    volumes:
      - family-tree-v2-data:/app/data
    restart: unless-stopped

volumes:
  family-tree-v2-data:
